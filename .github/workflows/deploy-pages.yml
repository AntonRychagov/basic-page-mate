name: Redirect GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create redirect page
        run: |
          mkdir -p dist
          cat > dist/index.html <<'EOF'
          <!doctype html>
          <html lang="ru">
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0; url=https://antonrychagov.github.io/" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Redirecting...</title>
              <link rel="canonical" href="https://antonrychagov.github.io/" />
              <script>
                window.location.replace('https://antonrychagov.github.io/' + window.location.hash);
              </script>
            </head>
            <body>
              <p>Redirecting to <a href="https://antonrychagov.github.io/">https://antonrychagov.github.io/</a>...</p>
            </body>
          </html>
          EOF
          cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
